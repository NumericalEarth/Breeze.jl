name: Documentation

on:
  push:
    branches:
      - main
    tags: "*"
    paths: &paths
      - ".github/workflows/Documentation.yml"
      - "docs/**"
      - "examples/**"
      - "src/**"
      - "Project.toml"
      - "CHANGELOG.md"
  pull_request:
    paths: *paths

concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: always.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BREEZE_LABEL_BUILD_ALL_EXAMPLES: 'build all examples 🏗️'
  # Don't make Reactant occupy all the GPU memory
  XLA_REACTANT_GPU_PREALLOCATE: 'false'
  JULIA_PKG_SERVER_REGISTRY_PREFERENCE: 'eager'
  # Silence most messages coming from XLA
  TF_CPP_MIN_LOG_LEVEL: '3'

jobs:
  build-docs:
    permissions:
      actions: write
      contents: write
      pull-requests: read
      statuses: write
    runs-on: aws-linux-nvidia-gpu-l4
    container:
      image: 'ghcr.io/numericalearth/breeze-docker-images:docs-julia_1.12.6'
      options: --gpus=all
      volumes:
        # Mount host `/usr/local` so that we can delete some stuff afterwards
        - /usr/local:/host-usr-local
    timeout-minutes: 120
    steps:
      - name: df before cleanup
        run: |
          df -hT
      - name: Clean up old CUDA toolkits
        # Save storage by deleting old CUDA toolkits, we'll use v13
        run: |
          rm -rf /host-usr-local/cuda-12.*
      - name: df after cleanup
        run: |
          df -hT
      - name: "Check out repository"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set BREEZE_BUILD_ALL_EXAMPLES
        shell: bash
        run: |
          if [[ ('${{ github.event_name }}' == 'push' && ('${{ github.ref }}' == 'refs/heads/main') || '${{ github.ref }}' == refs/tags/v*) || ('${{ github.event_name }}' == 'release') || ('${{ github.event_name }}' == 'pull_request' && ${{ contains(github.event.pull_request.labels.*.name,  env.BREEZE_LABEL_BUILD_ALL_EXAMPLES) }} == true) ]]; then
              BREEZE_BUILD_ALL_EXAMPLES=true
          else
              BREEZE_BUILD_ALL_EXAMPLES=false
          fi
          echo "BREEZE_BUILD_ALL_EXAMPLES=${BREEZE_BUILD_ALL_EXAMPLES}" | tee "${GITHUB_ENV}"
      - name: Instantiate docs environment
        shell: julia --color=yes --project=docs {0}
        run: |
          using Pkg
          Pkg.instantiate()
      - name: Prepare environment
        shell: bash
        run: |
          # Running doctests need to run `git` commands in this directory, but `git`
          # complains about dubious ownership when using the Docker image.
          git config --global --add safe.directory ${PWD}
      - name: Build documentation
        shell: bash
        timeout-minutes: 110
        run:
          earlyoom -m 3 -s 100 -r 300 --prefer 'julia' &
          julia --color=yes --project=docs --threads 1,$(($(nproc)-1)) docs/make.jl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: "Upload Manifest"
        if: always()
        timeout-minutes: 2
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: manifest
          path: '**/Manifest*.toml'
          retention-days: 90
      - name: "Upload docs build as artifact"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: documentation-build
          path: docs/build
          retention-days: 30

  deploy-docs:
    # We want to deploy docs if:
    # * it's a push, but only to main
    # * it's a PR, but not from a fork
    # * on a release
    if: ${{ (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))) || (github.event_name == 'pull_request' && ! github.event.pull_request.head.repo.fork) || (github.event_name == 'release') }}
    needs: build-docs
    permissions:
      actions: write
      contents: write
      pull-requests: read
      statuses: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      # Have only one job pushing the docs at a time.
      group: docs-pushing
    steps:
      - name: "Check out repository"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: "Install Julia"
        uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32 # v3.0.2
        with:
          version: "1.12.6"
      - name: "Cache Julia depot"
        uses: julia-actions/cache@a45e8fa8be21c18a06b7177052533149e61e9b38 # v3.1.0
      - name: "Download docs build artifact"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: documentation-build
          path: docs/build
      - name: Remove extra files
        # There may be JLD2 files generated during execution of Literate
        # examples, we don't need them on the website.
        run:
          rm -fv docs/build/literated/*.jld2
      - name: "Install Documenter"
        shell: julia --color=yes {0}
        run: |
          # We only need `Documenter` for publishing the docs, let's not
          # reinstall the world all over again.
          using Pkg
          Pkg.add(; name="Documenter", version="1")
      - name: Deploy documentation
        run:
          julia --color=yes docs/deploy.jl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.BREEZEDOCUMENTATION_DOCUMENTER_KEY }}
